<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso Administrativo | IusPilot</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#C74E4E", "primary-emphasis": "#540202",
                  "surface": "#f5faff",
                  "on-surface": "#171c20",
                },
                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Inter"],
                },
              },
            },
          }
    </script>
    <style>
        .glass-login {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(199, 78, 78, 0.1);
        }
        .bg-mesh {
            background-color: #f5faff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(199, 78, 78, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(199, 78, 78, 0.05) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-6 font-body">
    
    <div class="w-full max-w-md">
        <!-- Logo -->
        <a href="index.html" class="flex items-center group"><img src="images/logo-iuspilot.png" alt="IusPilot Logo" class="h-14 w-auto group-hover:opacity-80 transition-opacity"></a>

        <!-- Login Card -->
        <div class="glass-login p-10 rounded-[2.5rem] shadow-2xl">
            <div class="mb-10 text-center">
                <h1 class="text-2xl font-bold font-headline text-on-surface mb-2">Panel de Control</h1>
                <p class="text-sm text-stone-500">Identifíquese para gestionar el contenido.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-stone-400 mb-2 ml-1">Usuario</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" data-icon="person">person</span>
                        <input type="text" id="username" required 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-stone-100 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-sm"
                            placeholder="Nombre de usuario">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-stone-400 mb-2 ml-1">Contraseña</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" data-icon="lock">lock</span>
                        <input type="password" id="password" required 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-stone-100 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-sm"
                            placeholder="••••••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="hidden text-center text-xs font-bold text-primary bg-primary/5 py-3 rounded-xl">
                    Credenciales incorrectas. Inténtelo de nuevo.
                </div>

                <button type="submit" 
                    class="w-full bg-primary text-white py-4 rounded-2xl font-bold hover:brightness-110 shadow-xl shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Acceder al Editor</span>
                    <span class="material-symbols-outlined text-sm" data-icon="login">login</span>
                </button>
            </form>
        </div>

        <!-- Back to Web -->
        <div class="mt-12 text-center">
            <a href="index.html" class="text-xs font-bold text-stone-400 uppercase tracking-widest hover:text-primary transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                Volver a la web pública
            </a>
        </div>
    </div>

    <script>
        const VALID_USER = "administradoriuspilot";
        const VALID_PASS = "Iuspilot2026*?";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            if (user === VALID_USER && pass === VALID_PASS) {
                // Autenticación exitosa
                const sessionData = {
                    loggedIn: true,
                    timestamp: new Date().getTime(),
                    user: user
                };
                localStorage.setItem('iuspilot_admin_session', JSON.stringify(sessionData));
                
                // Redirigir al editor
                window.location.href = 'admin-pilot-editor.html';
            } else {
                // Error de autenticación
                errorMsg.classList.remove('hidden');
                setTimeout(() => {
                    errorMsg.classList.add('hidden');
                }, 3000);
            }
        });

        // Verificar si ya está logueado
        const session = localStorage.getItem('iuspilot_admin_session');
        if (session) {
            const data = JSON.parse(session);
            // Si la sesión tiene menos de 24 horas, redirigir
            if (new Date().getTime() - data.timestamp < 86400000) {
                window.location.href = 'admin-pilot-editor.html';
            }
        }
    </script>
</body>
</html>
